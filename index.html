<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Hóng Drama Ẩn Danh</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" alt="Full Screen">
</div>

<nav class="navbar">
    <button class="nav-btn active" id="btn-home" onclick="switchTab('home')">🏠 Bảng Tin</button>
    <button class="nav-btn" id="btn-create" onclick="switchTab('create')">✍️ Đăng Bài</button>
</nav>

<div class="container">
    <h1>Trạm Hóng Drama 🕵️‍♂️</h1>

    <div id="page-create" style="display: none;">
        <div class="post-form">
            <h2 style="margin-top:0; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 10px;">Soạn Bài Viết Mới</h2>
            <input type="text" id="author" placeholder="Tên ẩn danh (VD: Người qua đường A)..." oninput="updatePreview()">
            
            <input list="categoryList" id="category" placeholder="Chọn hoặc nhập danh mục mới..." oninput="updatePreview()" required>
            <datalist id="categoryList"></datalist>
            
            <textarea id="content" placeholder="Kể lại drama bạn hóng được..." oninput="updatePreview()" required></textarea>
            
            <label style="font-size: 0.85em; color: #57606f;">Dán link ảnh (Cách nhau bằng dấu phẩy nếu nhiều link):</label>
            <textarea id="imageLink" placeholder="https://drive..., https://anh..." style="min-height: 50px;" oninput="updatePreview()"></textarea>
            
            <label style="font-size: 0.85em; color: #57606f;">Hoặc tải ảnh lên (Hỗ trợ chọn nhiều ảnh):</label>
            <input type="file" id="imageFile" accept="image/*" multiple>
            
            <button class="btn-submit" onclick="submitPost()">🚀 Đăng Khẩn Cấp</button>
        </div>

        <div class="preview-box" id="previewBox">
            <div class="preview-title">👀 Xem trước hiển thị</div>
            <div class="post-header">
                <div class="post-author" id="previewAuthor">👤 Tên ẩn danh</div>
                <div class="post-category" id="previewCategory">🏷️ Danh mục</div>
            </div>
            <div class="post-content" id="previewText">Nội dung hiển thị tại đây...</div>
            <div id="previewGallery" class="image-gallery"></div>
        </div>
    </div>

    <div id="page-home">
        <div class="filter-bar">
            <label for="categoryFilter" style="font-weight: bold; color: var(--text);">Lọc danh mục:</label>
            <select id="categoryFilter" onchange="loadPosts(this.value)">
                <option value="">🌟 Tất cả drama</option>
            </select>
        </div>
        <div id="feed"><p class="loading">Đang tải các bài viết mới nhất...</p></div>
    </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
