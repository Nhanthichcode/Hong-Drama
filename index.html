<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Hóng Drama Ẩn Danh</title>
    <!-- Nhúng file giao diện CSS -->
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="imageModal" class="modal" onclick="closeModal()">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img id="modalImg" src="" onerror="this.onerror=null; this.src='../css/anhbiloi.png'">
</div>

<nav class="navbar">
    <button class="nav-btn active" id="btn-home" onclick="switchTab('home')">🏠 Bảng Tin</button>
    <button class="nav-btn" id="btn-create" onclick="switchTab('create')">✍️ Đăng Bài</button>
</nav>

<div class="container">
    <h1 id="pageTitle">Trạm Hóng Drama 🕵️‍♂️</h1>

    <!-- 1. TRANG ĐĂNG BÀI -->
    <div id="page-create" style="display: none;">
        <div class="post-form">
            <h2 style="margin-top:0; font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 10px;">Soạn Bài Viết Mới</h2>
            <input type="text" id="author" placeholder="Tên ẩn danh (VD: Người qua đường A)...">
            
            <input list="categoryList" id="category" placeholder="Chọn hoặc nhập danh mục mới..." required>
            <datalist id="categoryList"></datalist>
            
            <textarea id="content" placeholder="Kể lại drama bạn hóng được..." required></textarea>
            
            <label style="font-size: 0.85em; color: #57606f;">Dán link ảnh (Cách nhau bằng dấu phẩy):</label>
            <textarea id="imageLink" placeholder="https://drive..., https://anh..." style="min-height: 50px;"></textarea>
            
            <label style="font-size: 0.85em; color: #57606f;">Tải ảnh lên (Tối đa 10MB/ảnh - tổng cộng 100MB):</label>
            <input type="file" id="imageFile" accept="image/*" multiple onclick="this.value=null">
            
            <!-- KHU VỰC HIỂN THỊ FILE ĐÃ CHỌN -->
            <div id="selectedFilesBox" class="file-list"></div>
            
            <button class="btn-submit" id="submitBtn" onclick="submitPost()">🚀 Đăng Khẩn Cấp</button>
        </div>
    </div>

    <!-- 2. TRANG BẢNG TIN -->
    <div id="page-home">
        <div class="filter-bar">
            <label for="categoryFilter" style="font-weight: bold; color: var(--text);">Lọc danh mục:</label>
            <select id="categoryFilter" onchange="loadPosts(this.value)">
                <option value="">🌟 Tất cả drama</option>
            </select>
        </div>
        <div id="feed"><p class="loading">Đang tải các bài viết mới nhất...</p></div>
    </div>

    <!-- 3. TRANG CHI TIẾT BÀI VIẾT -->
    <div id="page-detail" style="display: none;">
        <div class="btn-back" onclick="switchTab('home')">⬅️ Quay lại bảng tin</div>
        <div id="detailContent" class="detail-box">
            <!-- Nội dung chi tiết sẽ được render tại đây -->
        </div>
    </div>
</div>

<!-- Nhúng file logic JavaScript -->
<script src="./js/script.js"></script>
</body>
</html>
